name: postmerge-ci

# This is the single entrypoint for main-only CI that is intentionally outside
# the merge-blocking suite. It keeps the broader postmerge signal in one run.
#
# Both children (rust-ci-full.yml, v8-canary.yml) are Bazel-based and need a
# custom self-hosted runner group, a paid macos-15-xlarge runner, and a
# BuildBuddy remote-cache API key -- none of which exist on this fork, so
# they'd fail/hang on every push. Disabled auto-trigger here (workflow_dispatch
# only) rather than deleting the file, in case that infrastructure gets set up
# later. blocking-ci.yml's Cargo-based `rust-ci` job already covers
# build/test/lint on standard runners for every push to main.
on:
  workflow_dispatch:

jobs:
  # Keep reusable workflow calls alphabetized. Each child retains its own
  # workflow_dispatch trigger so maintainers can rerun flaky suites directly.
  rust-ci-full:
    name: rust-ci-full
    uses: ./.github/workflows/rust-ci-full.yml
    secrets: inherit

  v8-canary:
    name: v8-canary
    uses: ./.github/workflows/v8-canary.yml
    secrets: inherit

  results:
    name: Postmerge CI results
    needs:
      - rust-ci-full
      - v8-canary
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      # Postmerge runs use the pushed main commit, so this helper always comes
      # from the same revision that defined the parent workflow.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Require successful dependencies
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: python3 .github/scripts/check_ci_results.py
